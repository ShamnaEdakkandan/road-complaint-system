<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #1e3c72, #2a5298);
        }

        .login-box{
            width: 380px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h1{
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
        }

        .input-group{
            margin-bottom: 20px;
        }

        .input-group input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus{
            border-color: #2a5298;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            background: #1e3c72;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #16325c;
        }

        .register-link{
            text-align: center;
            margin-top: 20px;
        }

        .register-link a{
            text-decoration: none;
            color: #1e3c72;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h1>Login</h1>

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="username" placeholder="Enter Username">
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Enter Password">
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="register-link">
            <p>Don't have an account?
                <a href="/register/">Register</a>
            </p>
        </div>

    </div>

</body>
</html>
