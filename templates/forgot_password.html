<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWD Portal - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            background: #ffffff;
            color: #333333;
        }

        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: #ffffff;
        }

        .box {
            width: 100%;
            max-width: 400px;
        }

        .brand-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .brand-header h1 {
            color: #003366;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-header p {
            color: #666666;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #003366;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #00509e;
            box-shadow: 0 0 0 2px rgba(0, 80, 158, 0.1);
        }

        .alert {
            margin-bottom: 20px;
            padding: 14px;
            border: 1px solid #E2E8F0;
            background: #F8FAFC;
            color: #334155;
            border-radius: 4px;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #003366;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:hover {
            background: #00509e;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
        }

        .back-link a {
            text-decoration: none;
            color: #00509e;
            font-weight: 700;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .image-section {
            flex: 1;
            display: flex;
            overflow: hidden;
            background-color: #003366;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 900px) {
            .split-container {
                flex-direction: column;
            }

            .image-section {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="split-container">
        <div class="form-section">
            <div class="box">
                <div class="brand-header">
                    <h1>Forgot Password</h1>
                    <p>Recover your PWD account access</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    {% if message %}
                    <div class="alert">{{ message }}</div>
                    {% endif %}

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Enter your username" required>
                    </div>

                    <button type="submit">Send Recovery Info</button>
                </form>

                <div class="back-link">
                    <p><a href="/login/">Back to Login</a></p>
                </div>
            </div>
        </div>

        <div class="image-section">
            <img src="/media/login_illustration.png" alt="Road Repair Illustration">
        </div>
    </div>

</body>

</html>
