<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWD Portal - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            background: #ffffff;
            color: #333333;
        }

        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

      
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: #ffffff;
        }

        .register-box {
            width: 100%;
            max-width: 400px;
        }

        .brand-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .brand-header h1 {
            color: #003366;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-header p {
            color: #666666;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #003366;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
            background-color: #ffffff;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #00509e;
            box-shadow: 0 0 0 2px rgba(0, 80, 158, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #003366;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:hover {
            background: #00509e;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
        }

        .login-link a {
            text-decoration: none;
            color: #00509e;
            font-weight: 700;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }

        
        .image-section {
            flex: 1;
            display: flex;
            overflow: hidden;
            background-color: #003366;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

       
        @media (max-width: 900px) {
            .split-container {
                flex-direction: column;
            }
            .image-section {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="split-container">
        
        <!-- Left: Form -->
        <div class="form-section">
            <div class="register-box">
                <div class="brand-header">
                    <h1>Create Account</h1>
                    <p>Register for PWD Access</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Choose a username" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create a secure password" required>
                    </div>

                    <div class="input-group">
                        <label>Account Type (Role)</label>
                        <select name="role" required>
                            <option value="citizen">Standard Citizen</option>
                            <option value="engineer">PWD Engineer</option>
                        </select>
                    </div>

                    <button type="submit">Submit Registration</button>
                </form>

                <div class="login-link">
                    <p>Already have an account? <a href="/login/">Return to Login</a></p>
                </div>
            </div>
        </div>

        <!-- Right: Illustration -->
        <div class="image-section">
            <img src="/media/login_illustration.png" alt="Road Repair Illustration">
        </div>

    </div>

</body>
</html>
